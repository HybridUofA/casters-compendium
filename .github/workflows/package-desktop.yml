name: Package desktop applications

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/package-desktop.yml"
      - "cmd/**"
      - "internal/**"
      - "data/**"
      - "packaging/**"
      - "go.mod"
      - "go.sum"

permissions:
  contents: read

env:
  APP_NAME: "Caster's Compendium"
  APP_ID: io.github.hybriduofa.casterdeckbuilder
  APP_VERSION: 0.1.5
  APP_BUILD: 1

jobs:
  package:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-24.04
            target: linux
            artifact: CastersCompendium-linux-amd64
          - label: Debian and Ubuntu x64
            runner: ubuntu-22.04
            target: debian
            artifact: casters-compendium_0.1.5_amd64
          - label: Arch Linux x64
            runner: ubuntu-24.04
            target: arch
            artifact: casters-compendium-0.1.5-1-x86_64
          - label: Windows x64
            runner: windows-2025
            target: windows
            artifact: CastersCompendium-windows-amd64
          - label: macOS Intel
            runner: macos-15-intel
            target: darwin-intel
            artifact: CastersCompendium-macos-intel
          - label: macOS Apple Silicon
            runner: macos-15
            target: darwin-arm64
            artifact: CastersCompendium-macos-apple-silicon

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        if: matrix.target != 'arch'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Linux build dependencies
        if: matrix.target == 'linux' || matrix.target == 'debian'
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc libgl1-mesa-dev libwayland-dev xorg-dev libxkbcommon-dev

      - name: Install Debian package tools
        if: matrix.target == 'debian'
        run: sudo apt-get install --yes dpkg-dev lintian

      - name: Run tests
        if: matrix.target != 'arch'
        run: go test -tags migrated_fynedo ./...

      - name: Package Linux application
        if: matrix.target == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          go build -tags migrated_fynedo -trimpath -ldflags="-s -w" -o dist/CastersCompendium ./cmd/deckbuilder
          go run fyne.io/fyne/v2/cmd/fyne@v2.8.0 package \
            --os linux \
            --executable "$PWD/dist/CastersCompendium" \
            --name "$APP_NAME" \
            --icon "$PWD/data/images/shadow.png" \
            --appID "$APP_ID" \
            --appVersion "$APP_VERSION" \
            --appBuild "$APP_BUILD" \
            --release
          mv "$APP_NAME.tar.xz" "dist/${{ matrix.artifact }}.tar.xz"

      - name: Package Debian and Ubuntu application
        if: matrix.target == 'debian'
        shell: bash
        run: |
          env GOCACHE="$RUNNER_TEMP/casters-compendium-go-build" \
            bash packaging/debian/build.sh "$APP_VERSION" "$PWD/dist"
          lintian --display-info "dist/${{ matrix.artifact }}.deb"

      - name: Package Arch Linux application
        if: matrix.target == 'arch'
        shell: bash
        run: |
          mkdir -p dist
          docker run --rm \
            --env "CASTERS_COMPENDIUM_SOURCE_FRAGMENT=commit=$GITHUB_SHA" \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            archlinux:base-devel \
            bash packaging/arch/build-in-container.sh

      - name: Package Windows application
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $icon = (Resolve-Path "data/images/shadow.png").Path
          go run fyne.io/fyne/v2/cmd/fyne@v2.8.0 package `
            --os windows `
            --sourceDir ./cmd/deckbuilder `
            --name "$env:APP_NAME" `
            --icon "$icon" `
            --appID "$env:APP_ID" `
            --appVersion "$env:APP_VERSION" `
            --appBuild "$env:APP_BUILD" `
            --tags migrated_fynedo `
            --release
          Move-Item "cmd/deckbuilder/$env:APP_NAME.exe" "dist/${{ matrix.artifact }}.exe"

      - name: Build Windows diagnostic executable
        if: matrix.target == 'windows' && github.ref_type != 'tag'
        shell: pwsh
        run: |
          go build `
            -tags migrated_fynedo `
            -trimpath `
            -o "dist/${{ matrix.artifact }}.diagnostic.exe" `
            ./cmd/deckbuilder

      - name: Package macOS application
        if: startsWith(matrix.target, 'darwin-')
        shell: bash
        run: |
          mkdir -p dist
          go build -tags migrated_fynedo -trimpath -ldflags="-s -w" -o dist/CastersCompendium ./cmd/deckbuilder
          go run fyne.io/fyne/v2/cmd/fyne@v2.8.0 package \
            --os darwin \
            --executable "$PWD/dist/CastersCompendium" \
            --name "$APP_NAME" \
            --icon "$PWD/data/images/shadow.png" \
            --appID "$APP_ID" \
            --appVersion "$APP_VERSION" \
            --appBuild "$APP_BUILD" \
            --release
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME.app" "dist/${{ matrix.artifact }}.zip"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@v6

      - name: Download packaged applications
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --title "Caster's Compendium $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* \
              --verify-tag \
              --generate-notes
          fi
