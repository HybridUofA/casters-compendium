name: Announce Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub release tag to announce
        required: true
        type: string

permissions:
  contents: read

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Post release to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NOTES: ${{ github.event.release.body }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          ROLE_ID: ${{ vars.DISCORD_RELEASE_ROLE_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$ROLE_ID" ]; then
            echo "DISCORD_RELEASE_ROLE_ID is not configured" >&2
            exit 1
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$REQUESTED_TAG" ]; then
              echo "A release tag is required for a manual announcement" >&2
              exit 1
            fi

            release_json="$(
              curl \
                --fail-with-body \
                --silent \
                --show-error \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$REQUESTED_TAG"
            )"

            RELEASE_NAME="$(jq -r '.name // ""' <<<"$release_json")"
            RELEASE_TAG="$(jq -r '.tag_name' <<<"$release_json")"
            RELEASE_URL="$(jq -r '.html_url' <<<"$release_json")"
            RELEASE_NOTES="$(jq -r '.body // ""' <<<"$release_json")"
            PRERELEASE="$(jq -r '.prerelease' <<<"$release_json")"
          fi

          if [ "$PRERELEASE" = "true" ]; then
            release_type="Prerelease"
          else
            release_type="Stable release"
          fi

          payload="$(
            jq -n \
              --arg title "${RELEASE_NAME:-$RELEASE_TAG}" \
              --arg tag "$RELEASE_TAG" \
              --arg url "$RELEASE_URL" \
              --arg notes "$RELEASE_NOTES" \
              --arg release_type "$release_type" \
              --arg role_id "$ROLE_ID" \
              '{
                username: "Caster Deckbuilder Releases",
                content: ("<@&" + $role_id + ">"),
                allowed_mentions: {
                  parse: [],
                  roles: [$role_id]
                },
                embeds: [{
                  title: ("New release: " + $title),
                  url: $url,
                  description: (
                    if ($notes | length) > 3500
                    then ($notes[0:3500] + "\n\n…See GitHub for complete release notes.")
                    elif ($notes | length) == 0
                    then "A new version of the Caster Chronicles deckbuilder is available."
                    else $notes
                    end
                  ),
                  color: 3447003,
                  fields: [
                    {
                      name: "Version",
                      value: $tag,
                      inline: true
                    },
                    {
                      name: "Release type",
                      value: $release_type,
                      inline: true
                    }
                  ]
                }]
              }'
          )"

          curl \
            --fail-with-body \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "$WEBHOOK_URL"
