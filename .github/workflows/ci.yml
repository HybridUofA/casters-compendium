name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, vet, test, and build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc libgl1-mesa-dev libwayland-dev xorg-dev libxkbcommon-dev

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following Go files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet -tags migrated_fynedo ./...

      - name: Test default build
        run: go test ./...

      - name: Test migrated Fyne threading build
        run: go test -tags migrated_fynedo ./...

      - name: Build deckbuilder
        run: go build -tags migrated_fynedo -trimpath ./cmd/deckbuilder

  vulnerability-scan:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - name: Install Fyne analysis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc libgl1-mesa-dev libwayland-dev xorg-dev libxkbcommon-dev

      - name: Scan Go dependencies and reachable code
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: ""
          go-version-file: go.mod
          go-package: ./...
          cache: false
